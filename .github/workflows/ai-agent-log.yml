name: Run AI Agent Daily Log

on:
  schedule:
    - cron: "0 6 * * *" # Runs every morning at 06:00 UTC
  workflow_dispatch: # Allows you to manually trigger it to test it immediately

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_log.py

      - name: Commit Updated Log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: autonomous agent profile update" || exit 0
          git push
